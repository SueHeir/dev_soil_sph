# Rest-state smoke test: uniform lattice block, fully periodic, no gravity.
# Expected: particles stay at rest (uniform pressure → zero net force).

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.1
y_low = 0.0
y_high = 0.1
z_low = 0.0
z_high = 0.1
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "periodic"

[neighbor]
newton = false        # dev_soil_sph uses the full-list gather formulation
skin_fraction = 1.2
bin_size = 0.035      # >= max pair cutoff = 2h·skin (h = 1.3·spacing = 0.013)

[sph]
[[sph.materials]]
name = "glass"
mu_s = 0.38
mu_2 = 0.64
i0 = 0.28
rho_s = 2500.0
rho_c = 1500.0
bulk_modulus = 3.75e6
poisson = 0.3
d = 0.5e-3

[[sph.insert]]
material = "glass"
region_min = [0.0, 0.0, 0.0]
region_max = [0.1, 0.1, 0.1]
spacing = 0.01
rest_density = 1515.0   # slightly above rho_c so p > 0 (connected)

[thermo]
columns = ["step", "atoms", "ke"]

[[run]]
name = "rest"
steps = 200
thermo = 50
dt = 2.0e-5
