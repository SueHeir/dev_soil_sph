# Footpad negative control. This is intentionally the same geometry/material as
# config.toml, but with gravity disabled. A bearing-pressure/sinkage gate must
# reject it: without overburden, the bed does not develop a stable seated loading
# branch even though the moving plate still exercises the same machinery.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = -0.06
x_high = 0.06
y_low = 0.0
y_high = 0.015
z_low = -0.015
z_high = 0.12
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "fixed"

[neighbor]
newton = false
skin_fraction = 1.2
bin_size = 0.02

[gravity]
gx = 0.0
gy = 0.0
gz = 0.0

[sph]
[[sph.materials]]
name = "glass"
mu_s = 0.38
mu_2 = 0.64
i0 = 0.28
rho_s = 2500.0
rho_c = 1500.0
bulk_modulus = 3.75e6
poisson = 0.3
d = 0.5e-3
restitution = 0.7

[[sph.insert]]
material = "glass"
region_min = [-0.06, 0.0, -0.015]
region_max = [0.06, 0.015, 0.0]
spacing = 0.005
frozen = true

[[sph.insert]]
material = "glass"
region_min = [-0.06, 0.0, 0.0]
region_max = [0.06, 0.015, 0.05]
spacing = 0.005
rest_density = 1500.0

[[sph.insert]]
material = "glass"
region_min = [-0.02, 0.0, 0.05]
region_max = [0.02, 0.015, 0.065]
spacing = 0.005
frozen = true
boundary_velocity = [0.0, 0.0, -0.05]

[output]
dir = "examples/footpad/data/zero_g"

[dump]
interval = 400
format = "lammps"

[thermo]
columns = ["step", "atoms", "ke"]

[[run]]
name = "penetrate_zero_g"
steps = 12000
dt = 1.5e-5
