# De-fluidization: a hot, dilated granular bed cools and consolidates. Initially
# Φ < Φ_c (ρ < ρ_c) so the contact branch is OFF — the bed is held up purely by
# the collisional KT pressure p_KT(T). As T decays (dissipation), p_KT fades,
# gravity compacts the bed (ρ rises past ρ_c), and the contact branch takes over.
# This is the landing-relevant transient: plume-fluidized regolith → load-bearing.
# Horizontal bed, periodic x/y, frozen floor → 1-D vertical consolidation.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.03
y_low = 0.0
y_high = 0.015
z_low = -0.015
z_high = 0.15
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "fixed"

[neighbor]
newton = false
skin_fraction = 1.2
bin_size = 0.02

[gravity]
gx = 0.0
gy = 0.0
gz = -9.81

[mud]
[[mud.materials]]
name = "glass"
mu_s = 0.38
mu_2 = 0.64
i0 = 0.28
rho_s = 2500.0
rho_c = 1500.0
bulk_modulus = 3.75e6
poisson = 0.3
d = 0.5e-3
restitution = 0.7

# Frozen floor.
[[mud.insert]]
material = "glass"
region_min = [0.0, 0.0, -0.015]
region_max = [0.03, 0.015, 0.0]
spacing = 0.005
frozen = true

# Hot, dilated bed: Φ = 0.55 (ρ = 1375 < ρ_c → contact off, KT-supported), hot.
[[mud.insert]]
material = "glass"
region_min = [0.0, 0.0, 0.0]
region_max = [0.03, 0.015, 0.05]
spacing = 0.005
rest_density = 1375.0          # Φ = 0.55 (dilated, below ρ_c)
initial_temperature = 0.05     # hot (p_KT initially supports the overburden)

[output]
dir = "examples/defluidization"

[dump]
interval = 1000
format = "lammps"

[thermo]
columns = ["step", "atoms", "ke"]

[[run]]
name = "consolidate"
steps = 30000
thermo = 3000
dt = 1.0e-5
