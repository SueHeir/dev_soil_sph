# Hydrostatic column: fluid settles under gravity onto frozen boundary layers.
# Periodic in x,y; gravity in -z. Expected: pressure increases linearly with
# depth, p(z) ≈ ρ g (z_top − z), and the column reaches rest.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = 0.0
x_high = 0.03
y_low = 0.0
y_high = 0.03
z_low = -0.01
z_high = 0.10
boundary_x = "periodic"
boundary_y = "periodic"
boundary_z = "fixed"

[neighbor]
newton = false
skin_fraction = 1.2
bin_size = 0.02      # >= 2h·skin (h = 1.3·0.005 = 0.0065)

[gravity]
gx = 0.0
gy = 0.0
gz = -9.81

[sph]
[[sph.materials]]
name = "glass"
mu_s = 0.38
mu_2 = 0.64
i0 = 0.28
rho_s = 2500.0
rho_c = 1500.0
bulk_modulus = 3.75e6
poisson = 0.3
d = 0.5e-3

# Frozen boundary: 3 layers (z = 0.0025, 0.0075, 0.0125).
[[sph.insert]]
material = "glass"
region_min = [0.0, 0.0, 0.0]
region_max = [0.03, 0.03, 0.015]
spacing = 0.005
frozen = true

# Fluid column: 10 layers above the boundary (z = 0.0175 … 0.0625).
[[sph.insert]]
material = "glass"
region_min = [0.0, 0.0, 0.015]
region_max = [0.03, 0.03, 0.065]
spacing = 0.005

[thermo]
columns = ["step", "atoms", "ke"]

[[run]]
name = "settle"
steps = 4000
thermo = 500
dt = 2.0e-5
