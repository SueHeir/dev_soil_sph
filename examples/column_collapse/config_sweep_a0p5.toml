# Column-collapse aspect sweep: a = H0/L0 = 0.5.

[comm]
processors_x = 1
processors_y = 1
processors_z = 1

[domain]
x_low = -0.12
x_high = 0.12
y_low = 0.0
y_high = 0.015
z_low = -0.015
z_high = 0.08
boundary_x = "fixed"
boundary_y = "periodic"
boundary_z = "fixed"

[neighbor]
newton = false
skin_fraction = 1.2
bin_size = 0.02

[gravity]
gx = 0.0
gy = 0.0
gz = -9.81

[validation]
aspect_ratio = 0.5
expect = "accept"

[sph]
[[sph.materials]]
name = "glass"
mu_s = 0.38
mu_2 = 0.64
i0 = 0.28
rho_s = 2500.0
rho_c = 1500.0
bulk_modulus = 3.75e6
poisson = 0.3
d = 0.5e-3
restitution = 0.7

[[sph.insert]]
material = "glass"
region_min = [-0.10, 0.0, -0.015]
region_max = [0.10, 0.015, 0.0]
spacing = 0.0025
frozen = true

[[sph.insert]]
material = "glass"
region_min = [-0.025, 0.0, 0.0]
region_max = [0.025, 0.015, 0.0125]
spacing = 0.0025
initial_temperature = 1.0e-5

[output]
dir = "examples/column_collapse/res_sweep_a0p5"

[dump]
interval = 1000
format = "lammps"

[thermo]
columns = ["step", "atoms", "ke"]

[[run]]
name = "collapse"
steps = 10000
thermo = 2000
dt = 1.3e-5
