[package]
name = "mud"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "MUD — Meshfree Unstructured Dynamics (granular SPH): examples and binaries"
publish = false

[dependencies]
mud_core = { path = "crates/mud_core" }
soil_deform = { git = "https://github.com/SueHeir/soil.git", branch = "master" }

[[example]]
name = "rest_state"
path = "examples/rest_state/main.rs"

[[example]]
name = "hydrostatic_column"
path = "examples/hydrostatic_column/main.rs"

[[example]]
name = "haff_cooling"
path = "examples/haff_cooling/main.rs"

[[example]]
name = "shear_heating"
path = "examples/shear_heating/main.rs"

[[example]]
name = "column_collapse"
path = "examples/column_collapse/main.rs"

[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/elizabeth-suehr/mud"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

# Build against the local grass checkout (mirrors DIRT) — pins the framework to
# the working local tree. `soil` is pulled from GitHub (un-patched) so MUD stays
# insulated from in-progress local `soil` edits (e.g. the LEBC work).
[patch."https://github.com/SueHeir/grass.git"]
grass_app       = { path = "/Users/suehr/Documents/GitHub/grass/crates/grass_app" }
grass_derive    = { path = "/Users/suehr/Documents/GitHub/grass/crates/grass_derive" }
grass_io        = { path = "/Users/suehr/Documents/GitHub/grass/crates/grass_io" }
grass_mpi       = { path = "/Users/suehr/Documents/GitHub/grass/crates/grass_mpi" }
grass_multi     = { path = "/Users/suehr/Documents/GitHub/grass/crates/grass_multi" }
grass_scheduler = { path = "/Users/suehr/Documents/GitHub/grass/crates/grass_scheduler" }

# TEMPORARY: build against the local `soil` checkout to pick up the (landed but
# uncommitted) triclinic / Lees-Edwards-shear work, so MUD can shear with
# soil_deform. Revert to the GitHub-pinned soil once that work is committed+pushed.
[patch."https://github.com/SueHeir/soil.git"]
soil_core   = { path = "/Users/suehr/Documents/GitHub/soil/crates/soil_core" }
soil_derive = { path = "/Users/suehr/Documents/GitHub/soil/crates/soil_derive" }
soil_verlet = { path = "/Users/suehr/Documents/GitHub/soil/crates/soil_verlet" }
soil_print  = { path = "/Users/suehr/Documents/GitHub/soil/crates/soil_print" }
soil_deform = { path = "/Users/suehr/Documents/GitHub/soil/crates/soil_deform" }
