# dev_soil_sph (dev_sph) validation set — DECLARATIVE manifest.
#
# This file is DATA, not a script: it declares which checked-in examples are
# skeptic-facing VALIDATIONS (numeric pass/fail against an external reference)
# versus which are DEMOS (self-consistent operator/physics showcases that do NOT
# claim external validation). `validation/run.sh` reads nothing from here — it is
# the human-and-reviewer-facing source of truth for "what is validated, against
# what, to what tolerance". See validation/README.md for the full rationale.

[set]
name = "dev_sph-validation"
tier = "dev_sph"
description = "Skeptic-facing validation of the dev_soil_sph granular-SPH μ(I)/KT continuum."

# ── VALIDATIONS ──────────────────────────────────────────────────────────────
# Each recovers an INDEPENDENT reference (experiment or a different continuum/DEM
# code) with a numeric pass/fail band. Reference bands are quoted from the cited
# papers, NOT back-fitted to the current model output.

[[validation]]
id = "hydrostatic_rest"          # plan sec3 dev_sph #1
examples = ["rest_state", "hydrostatic_column"]
configs = ["examples/rest_state/config.toml", "examples/hydrostatic_column/config.toml"]
reference = "Bui, Fukagawa, Sako & Ohno 2008, IJNAMG 32:1537, DOI 10.1002/nag.688"
checks = [
  "rest_state: uniform periodic lattice stays at rest (max speed -> 0)",
  "hydrostatic: pressure gradient dp/dz within [0.7,1.3] x (-rho*g)",
  "hydrostatic: regression floor dp/dz / (-rho*g) >= 0.8208 (current baseline; expected target 1.0, raise as the model improves)",
  "hydrostatic: NO SPH tensile instability — pressure compressive (p_min >= -0.5% p_base)",
  "hydrostatic: NO clumping/voids — density spread < 2%",
]

[[validation]]
id = "column_collapse"           # plan sec3 dev_sph #3
examples = ["column_collapse"]
configs = [
  "examples/column_collapse/config_sweep_a0p5.toml",
  "examples/column_collapse/config_sweep_a1.toml",
  "examples/column_collapse/config_a.toml",  # spacing 5.0e-3 (coarse)
  "examples/column_collapse/config_b.toml",  # spacing 3.3e-3 (medium)
  "examples/column_collapse/config_c.toml",  # spacing 2.5e-3 (fine)
  "examples/column_collapse/config_sweep_a3.toml",
  "examples/column_collapse/config_sweep_a6.toml",
]
reference = "Lube et al. 2005 (PRE 72:041301) & Lajeunesse et al. 2005, via Lagrée-Staron-Popinet 2011, JFM 686:378, DOI 10.1017/jfm.2011.335, Eqs. (3.1)-(3.2)"
aspect_ratios = [0.5, 1.0, 2.0, 3.0, 6.0]
checks = [
  "normalized run-out (L_inf-L0)/L0 against Lube/Lajeunesse/LSP Eq.3.1 bands; a=2 remains [2.40, 3.60]",
  "normalized height H_inf/L0 against LSP Eq.3.2 bands; a=2 remains [0.80, 1.70]",
  "declared shallow-column limitations: a=0.5 run-out 0.10 vs [0.60,1.10], a=1 run-out 0.90 vs [1.20,2.20] (outside_reference, not band-loosened)",
  "accepted aspect sweep: a=2 run-out/height 2.50/1.49, a=3 4.10/1.82, a=6 8.70/2.19",
  "high-a quantitative note: a=6 over Lube/Lajeunesse power-law upper 7.59 but below LSP continuum 13.20",
  "deposit arrested (max speed < 1 m/s) and bounded (T < 1)",
  "resolution convergence: run-out consistent across configs a/b/c",
]
# Falsifiability / negative control (same example; [validation] expect="reject"
# inverts the verdict so a PASS here means "band correctly rejected wrong physics").
negative_control = "examples/column_collapse/config_negctl.toml"
negative_control_checks = [
  "over-frictional material (mu_s=2.0, mu_2=2.5; friction angle ~63-68deg) MUST leave the reference band",
  "measured: run-out (L_inf-L0)/L0 = -0.10 (< 2.40) AND H_inf/L0 = 1.90 (> 1.70) -> REJECTED",
  "control guard: the SAME real material declared expect=reject FAILS (rc=1) -> gate is not vacuous",
]

[[validation]]
id = "mu_i_return_map"           # plan sec3 dev_sph — rheology closure
examples = ["simple_shear_mu_i"]
configs = []                     # self-contained: target constants baked in, no config file
reference = "Jop, Forterre & Pouliquen 2006, Nature 441:727, DOI 10.1038/nature04801; GDR MiDi 2004, EPJE 14:341"
checks = [
  "shear a pressurized sample across a range of inertial numbers I; fit mu(I) = mu_s + (mu_2-mu_s) I/(I+I_0)",
  "fitted (mu_s, mu_2, I_0) recover the glass-bead target (0.380, 0.640, 0.280) within tolerance",
  "per-point and RMS residual gates + I-collapse; exit != 0 on any failed check (measured fit: 0.38001, 0.63985, 0.28042, RMS 5.2e-6)",
]

[[validation]]
id = "footpad_bearing_sinkage"
examples = ["footpad"]
configs = [
  "examples/footpad/config.toml",
  "examples/footpad/config_negctl.toml",
]
reference = "Bekker 1956/1969 and Wong 2008 pressure-sinkage p=(k_c/b+k_phi) z^n, with independent DIRT DEM plate-sinkage benchmark examples/bench_plate_sinkage as the exponent-band oracle"
checks = [
  "run the SPH footpad and fit the seated loading branch after 2 mm of contact seating",
  "excess pressure must follow Bekker/Wong p proportional z^n with R^2 >= 0.90",
  "fitted n must sit inside the DIRT DEM/Bekker reference gate [0.824, 1.600] (DIRT DEM case range expanded by 0.25 and clipped to the granular-soil Bekker band [0.4, 1.6])",
  "excess pressure must rise by at least 500 Pa and be nearly monotone over the seated branch",
  "negative control examples/footpad/config_negctl.toml disables gravity and MUST be rejected by the same oracle",
]

# ── DEMOS (NOT validations) ──────────────────────────────────────────────────
# Self-consistent operator/physics showcases. They have internal PASS/FAIL smoke
# checks but do NOT recover an external reference, so they are excluded from the
# validation set. defluidization remains a load-bearing seed for the future
# SPH-CFD plume-surface coupling (goal sph-cfd-plume-surface).

[[demo]]
id = "haff_cooling"
example = "haff_cooling"
role = "granular-temperature Haff-law decay (KT branch) — operator showcase"

[[demo]]
id = "shear_heating"
example = "shear_heating"
role = "KT shear-production under Lees-Edwards shear — operator showcase"

[[demo]]
id = "conduction_test"
example = "conduction_test"
role = "SPH Laplacian for grad.(kappa grad T) — operator unit check"

[[demo]]
id = "defluidization"
example = "defluidization"
role = "KT -> contact stress hand-off (landing transient) — SPH-CFD seed"
